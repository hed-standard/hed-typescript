name: Test coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  Coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.0.0
      - name: Set up with Node.js LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4.0.1
        with:
          node-version: lts/*
      - name: Download dependencies
        run: npm ci
      - name: Generate coverage report
        run: npm run coverage
      - name: Upload coverage to Quality
        if: github.event_name == 'push'
        uses: qltysh/qlty-action/coverage@08a0a862c159eae9b9003081da6663d96efef637 # v1.0.0
        with:
          oidc: true
          files: coverage/lcov.info
