name: Test coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  Coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.0.0
      - name: Set up with Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.0.1
        with:
          node-version: lts/*
      - name: Download dependencies
        run: npm ci
      - name: Generate coverage report
        run: npm run coverage
      - name: Upload coverage to Quality
        if: github.event_name == 'push'
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v1.0.0
        with:
          oidc: true
          files: coverage/lcov.info
